# Template for the Secrets the StatefulSet expects.
# Do NOT commit real values — use SealedSecrets or External Secrets Operator.
#
# Apply the SAME secrets in BOTH halls (hall1 + hall2) so they share DACS credentials,
# DB password, Kafka SASL, Redis password. The secrets are identical across halls.
#
# Usage:
#   cp secret.template.yaml /tmp/secret.yaml
#   # fill in REPLACE-ME values
#   oc apply -f /tmp/secret.yaml --context hall1-cluster
#   oc apply -f /tmp/secret.yaml --context hall2-cluster
#   rm /tmp/secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-db
type: Opaque
stringData:
  url:      "jdbc:postgresql://postgres-primary.db.svc:5432/marketdata"
  user:     "marketdata"
  password: "REPLACE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-kafka
type: Opaque
stringData:
  sasl-jaas: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="marketdata" password="REPLACE-ME";'
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-redis
type: Opaque
stringData:
  password: "REPLACE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-lseg
type: Opaque
stringData:
  # DACS username (same value in both halls — per-user licensing)
  dacs-username: "marketdata-adapter"
  # RTO OAuth2 (only used if marketdata.lseg.connection-mode=RTO_CLOUD)
  client-id:     "REPLACE-ME"
  client-secret: "REPLACE-ME"
