apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: market-data-service
  labels:
    app: market-data-service
spec:
  serviceName: market-data-service-headless
  # 2 replicas per OpenShift cluster (hall1 + hall2 = 4 pods total)
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/marketdata/market-data-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: openshift
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            # Hall identifier (hall1 / hall2) — from the hall-specific ConfigMap
            - name: HALL
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: hall } }
            # Pod role: ordinal 0 = warm-eligible, ordinal 1 = cold-only (same in both halls)
            - name: POD_ROLE
              valueFrom: { configMapKeyRef: { name: market-data-service-pod-roles, key: $(POD_NAME) } }
            # ----- DB -----
            - name: DB_URL
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: url } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: user } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: password } }
            # ----- Kafka -----
            - name: KAFKA_BOOTSTRAP
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: kafka.bootstrap } }
            - name: KAFKA_SASL_JAAS
              valueFrom: { secretKeyRef: { name: market-data-service-kafka, key: sasl-jaas } }
            # ----- Redis (Enterprise — cross-hall connectivity) -----
            - name: REDIS_CLUSTER_NODES
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: redis.cluster-nodes } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: market-data-service-redis, key: password } }
            # ----- LSEG (on-prem TREP, DACS auth) -----
            - name: LSEG_DACS_USERNAME
              valueFrom: { secretKeyRef: { name: market-data-service-lseg, key: dacs-username } }
            - name: LSEG_DACS_POSITION
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.dacs-position } }
            - name: LSEG_DACS_APPLICATION_ID
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.dacs-application-id } }
            - name: LSEG_ADS_HOST
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.ads-host } }
            - name: LSEG_ADS_PORT
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.ads-port } }
            - name: LSEG_ADS_BACKUP_HOST
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.ads-backup-host } }
            - name: LSEG_ADS_BACKUP_PORT
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.ads-backup-port } }
            - name: LSEG_SERVICE_NAME
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: lseg.service-name } }
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "2Gi" }
          startupProbe:
            httpGet:  { path: /actuator/health, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:  { path: /actuator/health/liveness, port: http }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:  { path: /actuator/health/readiness, port: http }
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service-headless
spec:
  clusterIP: None
  selector:
    app: market-data-service
  ports:
    - port: 8080
      name: http
