# Template for the Secrets the StatefulSet expects.
# Do NOT commit real values. Use `oc create secret generic ...` or a SealedSecret.
#
# Usage:
#   cp secret.template.yaml secret.yaml
#   # fill in values (base64-encoded if using `data:`, or plain via `stringData:`)
#   oc apply -f secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-db
type: Opaque
stringData:
  url:      "jdbc:postgresql://postgres-primary.db.svc:5432/marketdata"
  user:     "marketdata"
  password: "REPLACE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-kafka
type: Opaque
stringData:
  sasl-jaas: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="marketdata" password="REPLACE-ME";'
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-redis
type: Opaque
stringData:
  password: "REPLACE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: market-data-service-lseg
type: Opaque
stringData:
  client-id:     "REPLACE-ME"     # RTO V2 OAuth client id
  client-secret: "REPLACE-ME"     # RTO V2 OAuth client secret
