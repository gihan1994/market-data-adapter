apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: market-data-service
  labels:
    app: market-data-service
spec:
  serviceName: market-data-service-headless
  replicas: 4
  podManagementPolicy: Parallel   # bring all pods up in parallel; leader election sorts them out
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/marketdata/market-data-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: openshift
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            # Pod role: ordinal 0,1 → warm-eligible; 2,3 → cold-only.
            # An init container computes this from $POD_NAME and writes /etc/pod-env/POD_ROLE.
            - name: POD_ROLE
              valueFrom: { configMapKeyRef: { name: market-data-service-pod-roles, key: $(POD_NAME) } }
            - name: DB_URL
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: url } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: user } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: market-data-service-db, key: password } }
            - name: KAFKA_BOOTSTRAP
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: kafka.bootstrap } }
            - name: KAFKA_SASL_JAAS
              valueFrom: { secretKeyRef: { name: market-data-service-kafka, key: sasl-jaas } }
            - name: REDIS_CLUSTER_NODES
              valueFrom: { configMapKeyRef: { name: market-data-service-config, key: redis.cluster-nodes } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: market-data-service-redis, key: password } }
            - name: LSEG_CLIENT_ID
              valueFrom: { secretKeyRef: { name: market-data-service-lseg, key: client-id } }
            - name: LSEG_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: market-data-service-lseg, key: client-secret } }
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "2Gi" }
          startupProbe:
            httpGet:  { path: /actuator/health, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:  { path: /actuator/health/liveness, port: http }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:  { path: /actuator/health/readiness, port: http }
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                # Give the leader-lock release + EMA close time before SIGKILL
                command: ["sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service-headless
spec:
  clusterIP: None
  selector:
    app: market-data-service
  ports:
    - port: 8080
      name: http
