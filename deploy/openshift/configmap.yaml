apiVersion: v1
kind: ConfigMap
metadata:
  name: market-data-service-config
data:
  kafka.bootstrap: "kafka-broker-0.kafka.svc:9092,kafka-broker-1.kafka.svc:9092,kafka-broker-2.kafka.svc:9092"
  redis.cluster-nodes: "redis-node-0.redis.svc:6379,redis-node-1.redis.svc:6379,redis-node-2.redis.svc:6379"
---
# Per-pod role assignment. Each StatefulSet pod is named market-data-service-{0,1,2,3}.
# Ordinals 0 and 1 are warm-eligible (hold open EMA session = 2 LSEG logins total).
# Ordinals 2 and 3 are cold-only (no LSEG session unless promoted).
apiVersion: v1
kind: ConfigMap
metadata:
  name: market-data-service-pod-roles
data:
  market-data-service-0: "warm-eligible"
  market-data-service-1: "warm-eligible"
  market-data-service-2: "cold-only"
  market-data-service-3: "cold-only"
